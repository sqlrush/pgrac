<svg viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cache Fusion 3-way protocol" preserveAspectRatio="xMidYMid meet">
<rect x="0" y="0" width="1100" height="520" fill="#0a0a0a"/>
    <defs>
      <marker id="cf-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#5a9fd4"/>
      </marker>
      <marker id="cf-warm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#c9a878"/>
      </marker>
      <radialGradient id="cf-glow" cx="0.5" cy="0.5">
        <stop offset="0%" stop-color="#5a9fd4" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#5a9fd4" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- title strip -->
    <text x="60" y="32" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7a7870" letter-spacing="0.18em">CACHE FUSION · 3-WAY PROTOCOL</text>
    <text x="1040" y="32" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#5a9fd4">5–10 μs · disk bypassed</text>

    <!-- glow under master -->
    <ellipse cx="550" cy="105" rx="160" ry="80" fill="url(#cf-glow)"/>

    <!-- nodes -->
    
    <g transform="translate(440,60)">
      <rect width="220" height="90" rx="4" fill="#161616" stroke="#5a9fd4" stroke-width="1"/>
      <rect width="3" height="90" fill="#5a9fd4"/>
      <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#f5f5f4">grd-master</text>
      <text x="14" y="40" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#b3b1a6">resource owner · GRD</text>
      <g transform="translate(14, 68)">
        <rect width="42" height="14" rx="2" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.20)"/>
        <text x="21" y="10.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#5a9fd4" letter-spacing="0.06em">MSTR</text>
        <text x="50" y="10.5" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7a7870">authority</text>
      </g>
    </g>
  
    
    <g transform="translate(90,250)">
      <rect width="240" height="100" rx="4" fill="#161616" stroke="#c9a878" stroke-width="1"/>
      <rect width="3" height="100" fill="#c9a878"/>
      <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#f5f5f4">node A · holder</text>
      <text x="14" y="40" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#b3b1a6">has block in XCUR · dirty</text>
      <g transform="translate(14, 78)">
        <rect width="42" height="14" rx="2" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.20)"/>
        <text x="21" y="10.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#c9a878" letter-spacing="0.06em">HLDR</text>
        <text x="50" y="10.5" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7a7870">block owner</text>
      </g>
    </g>
  
    
    <g transform="translate(770,250)">
      <rect width="240" height="100" rx="4" fill="#161616" stroke="#7eb5e0" stroke-width="1"/>
      <rect width="3" height="100" fill="#7eb5e0"/>
      <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#f5f5f4">node B · requester</text>
      <text x="14" y="40" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#b3b1a6">needs S | X mode</text>
      <g transform="translate(14, 78)">
        <rect width="42" height="14" rx="2" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.20)"/>
        <text x="21" y="10.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7eb5e0" letter-spacing="0.06em">REQ</text>
        <text x="50" y="10.5" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#7a7870">asking</text>
      </g>
    </g>
  

    <!-- ① requester → master -->
    <path d="M 860 250 C 840 170, 610 190, 580 150"
          fill="none" stroke="#5a9fd4" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#cf-acc)" class="flow-arrow"/>
    <g transform="translate(750, 160)">
      <circle r="14" fill="#1c1c1c" stroke="#5a9fd4"/>
      <text y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#5a9fd4">①</text>
      <text x="22" y="-4" font-family="JetBrains Mono, monospace" font-size="11" fill="#f5f5f4">request + mode</text>
      <text x="22" y="11" font-family="JetBrains Mono, monospace" font-size="10" fill="#b3b1a6">GES message</text>
    </g>

    <!-- ② master → holder -->
    <path d="M 520 150 C 490 190, 260 170, 240 250"
          fill="none" stroke="#5a9fd4" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#cf-acc)" class="flow-arrow" style="animation-delay:.5s"/>
    <g transform="translate(280, 160)">
      <circle r="14" fill="#1c1c1c" stroke="#5a9fd4"/>
      <text y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#5a9fd4">②</text>
      <text x="22" y="-4" font-family="JetBrains Mono, monospace" font-size="11" fill="#f5f5f4">forward to holder</text>
      <text x="22" y="11" font-family="JetBrains Mono, monospace" font-size="10" fill="#b3b1a6">GRD lookup</text>
    </g>

    <!-- ③ holder → requester (the centerpiece) -->
    <g>
      <path d="M 330 300 L 770 300"
            fill="none" stroke="#c9a878" stroke-width="2.2" stroke-dasharray="8 5" marker-end="url(#cf-warm)" class="flow-arrow" style="animation-delay:1s"/>
      <!-- moving block payload -->
      <g>
        <rect x="-10" y="-7" width="20" height="14" rx="2" fill="#c9a878" stroke="#c9a878">
          <animateMotion dur="2s" repeatCount="indefinite" path="M 330 300 L 770 300"/>
        </rect>
      </g>
    </g>
    <g transform="translate(460, 250)">
      <circle r="14" fill="#1c1c1c" stroke="#c9a878"/>
      <text y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#c9a878">③</text>
      <text x="22" y="-4" font-family="JetBrains Mono, monospace" font-size="11" fill="#f5f5f4">direct block ship · RDMA</text>
      <text x="22" y="11" font-family="JetBrains Mono, monospace" font-size="10" fill="#c9a878">5–10 μs · 8 KB page</text>
    </g>

    <!-- shared disk (bypassed) -->
    <g transform="translate(90, 410)">
      <rect width="920" height="64" rx="3" fill="#1c1c1c" stroke="rgba(255,255,255,0.10)" stroke-dasharray="3 4"/>
      <text x="20" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870" letter-spacing="0.1em">SHARED DISK</text>
      <text x="20" y="44" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7a7870">bypassed in cache-fusion path · only used for durability</text>
      <!-- big X overlay -->
      <text x="890" y="42" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="22" fill="#7a7870" opacity="0.5">×</text>
      <!-- precondition pill -->
      <g transform="translate(640, 22)">
        <rect width="240" height="24" rx="3" fill="rgba(127,176,105,0.08)" stroke="#7fb069" stroke-opacity="0.5"/>
        <text x="12" y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#7fb069">precondition · WAL fsync ✓</text>
      </g>
    </g>

    <!-- vertical lines from holder/requester down to disk (dashed, faded) -->
    <line x1="210" y1="350" x2="210" y2="410" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 6"/>
    <line x1="890" y1="350" x2="890" y2="410" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 6"/>
  </svg>