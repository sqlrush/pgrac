          <text x="140" y="380" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f5f5f4">Recovery · Membership · GCR</text>
          <text x="140" y="398" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7eb5e0">voting disk · quorum · failover</text>
          <!-- side label -->
          <text x="832" y="388" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a9fd4" letter-spacing="0.12em">PGRAC</text>
          <line x1="140" y1="421" x2="780" y2="421" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 4"/>
        </g>
      
        <g>
          <!-- layer index -->
          <text x="82" y="462" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870">02</text>
          <!-- bar -->
          <rect x="120" y="430" width="680" height="56" rx="3" fill="url(#sl-rac)" stroke="#5a9fd4" stroke-width="1" shape-rendering="crispEdges"/>
          <rect x="120" y="430" width="3" height="56" fill="#5a9fd4"/>
          <text x="140" y="454" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f5f5f4">Transport · RDMA + TCP</text>
          <text x="140" y="472" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7eb5e0">tier-3 interconnect · 5–10 μs</text>
          <!-- side label -->
          <text x="832" y="462" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a9fd4" letter-spacing="0.12em">PGRAC</text>
          <line x1="140" y1="495" x2="780" y2="495" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 4"/>
        </g>
      
        <g>
          <!-- layer index -->
          <text x="82" y="536" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870">01</text>
          <!-- bar -->
          <rect x="120" y="504" width="680" height="56" rx="3" fill="url(#sl-rac)" stroke="#5a9fd4" stroke-width="1" shape-rendering="crispEdges"/>
          <rect x="120" y="504" width="3" height="56" fill="#5a9fd4"/>
          <text x="140" y="528" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f5f5f4">Storage · shared disk volume</text>
          <text x="140" y="546" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7eb5e0">replaces PG shared-nothing · SCSI-3 PR fencing required</text>
          <!-- side label -->
          <text x="832" y="536" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a9fd4" letter-spacing="0.12em">PGRAC</text>
          
        </g>
      

    <!-- direction indicator -->
    <g transform="translate(910, 80)">
      <line x1="0" y1="0" x2="0" y2="460" stroke="#7a7870" stroke-width="1"/>
      <polygon points="-4,460,4,460,0,470" fill="#7a7870"/>
      <text x="14" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7870" letter-spacing="0.08em">app</text>
      <text x="14" y="468" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7870" letter-spacing="0.08em">disk</text>
    </g>
  </svg>