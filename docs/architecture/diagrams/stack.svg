<svg viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="pgrac stack layers">
<rect x="0" y="0" width="1100" height="650" fill="#0a0a0a"/>
    <defs>
      <linearGradient id="sl-rac" x1="0" x2="1">
        <stop offset="0%" stop-color="#5a9fd4" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#5a9fd4" stop-opacity="0.03"/>
      </linearGradient>
    </defs>

    <!-- header strip -->
    <text x="60" y="32" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7a7870" letter-spacing="0.18em">STACK · TOP TO BOTTOM</text>
    <g transform="translate(1040, 32)" font-family="JetBrains Mono, monospace" font-size="10.5">
      <rect x="-150" y="-12" width="14" height="14" rx="2" fill="#1c1c1c" stroke="rgba(255,255,255,0.18)"/>
      <text x="-130" y="-1" fill="#b3b1a6">PG upstream</text>
      <rect x="-60" y="-12" width="14" height="14" rx="2" fill="url(#sl-rac)" stroke="#5a9fd4"/>
      <text x="-40" y="-1" fill="#5a9fd4">pgrac added</text>
    </g>

    <!-- left rail -->
    <line x1="98" y1="60" x2="98" y2="560" stroke="rgba(255,255,255,0.10)"/>
    <text x="92" y="68" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7870" letter-spacing="0.08em">L7</text>
    <text x="92" y="556" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7870" letter-spacing="0.08em">L1</text>

    
        <g>
          <!-- layer index -->
          <text x="82" y="92" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870">07</text>
          <!-- bar -->
          <rect x="120" y="60" width="680" height="56" rx="3" fill="#161616" stroke="rgba(255,255,255,0.18)" stroke-width="1" shape-rendering="crispEdges"/>
          <rect x="120" y="60" width="3" height="56" fill="#7a7870"/>
          <text x="140" y="84" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f5f5f4">SQL · 100% PostgreSQL compatible</text>
          <text x="140" y="102" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#b3b1a6">libpq · drivers · ecosystem</text>
          <!-- side label -->
          <text x="832" y="92" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7870" letter-spacing="0.12em">PG</text>
          <line x1="140" y1="125" x2="780" y2="125" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 4"/>
        </g>
      
        <g>
          <!-- layer index -->
          <text x="82" y="166" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870">06</text>
          <!-- bar -->
          <rect x="120" y="134" width="680" height="56" rx="3" fill="#161616" stroke="rgba(255,255,255,0.18)" stroke-width="1" shape-rendering="crispEdges"/>
          <rect x="120" y="134" width="3" height="56" fill="#7a7870"/>
          <text x="140" y="158" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f5f5f4">Execution · Parser · Planner · Executor</text>
          <text x="140" y="176" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#b3b1a6">PG 16.13 kernel preserved</text>
          <!-- side label -->
          <text x="832" y="166" font-family="JetBrains Mono, monospace" font-size="10" fill="#7a7870" letter-spacing="0.12em">PG</text>
          <line x1="140" y1="199" x2="780" y2="199" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 4"/>
        </g>
      
        <g>
          <!-- layer index -->
          <text x="82" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870">05</text>
          <!-- bar -->
          <rect x="120" y="208" width="680" height="56" rx="3" fill="url(#sl-rac)" stroke="#5a9fd4" stroke-width="1" shape-rendering="crispEdges"/>
