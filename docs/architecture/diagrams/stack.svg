          <text x="140" y="232" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f5f5f4">MVCC · dual-track · SCN + ITL + TT + Undo + CR</text>
          <text x="140" y="250" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7eb5e0">+1 B itl_idx · xmin/xmax retained · two paths</text>
          <!-- side label -->
          <text x="832" y="240" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a9fd4" letter-spacing="0.12em">PGRAC</text>
          <line x1="140" y1="273" x2="780" y2="273" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 4"/>
        </g>
      
        <g>
          <!-- layer index -->
          <text x="82" y="314" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870">04</text>
          <!-- bar -->
          <rect x="120" y="282" width="680" height="56" rx="3" fill="url(#sl-rac)" stroke="#5a9fd4" stroke-width="1" shape-rendering="crispEdges"/>
          <rect x="120" y="282" width="3" height="56" fill="#5a9fd4"/>
          <text x="140" y="306" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#f5f5f4">Buffer · Cache Fusion + PCM + GES</text>
          <text x="140" y="324" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#7eb5e0">cross-node ship · PCM 3-mode + GES 8-mode</text>
          <!-- side label -->
          <text x="832" y="314" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a9fd4" letter-spacing="0.12em">PGRAC</text>
          <line x1="140" y1="347" x2="780" y2="347" stroke="rgba(255,255,255,0.10)" stroke-dasharray="2 4"/>
        </g>
      
        <g>
          <!-- layer index -->
          <text x="82" y="388" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7a7870">03</text>
          <!-- bar -->
          <rect x="120" y="356" width="680" height="56" rx="3" fill="url(#sl-rac)" stroke="#5a9fd4" stroke-width="1" shape-rendering="crispEdges"/>
