#-------------------------------------------------------------------------
#
# release.yml
#    spec-5.21 D8 -- release pipeline (CLAUDE.md rule 20 release.yml
#    placeholder, first landing).
#
#    Triggered by an internal monotonic release tag (v*-stage5.21 and later
#    release tags).  Builds a self-contained release artifact named with the
#    PUBLIC label (pgrac-v0.5.0-beta-<os>-<arch>.tar.gz) and verifies the public
#    release notes carry no private design reasoning (principle-0 gate, D7).
#
#    This is a CI dry-run: it packages and uploads a workflow artifact for
#    inspection.  It does NOT create a public GitHub Release -- publishing the
#    first public beta is a deliberate, human-gated step (the release-cut
#    precondition is a real 4-node faithful chaos-soak PASS, HG#2a-CI or
#    HG#2a-EXT; see spec-5.21 HG#2 / R13).  nightly.yml verifies the tag commit
#    separately.
#
# IDENTIFICATION
#    .github/workflows/release.yml
#
# Author: SqlRush <sqlrush@gmail.com>
#
# Portions Copyright (c) 2026, pgrac contributors
#
#-------------------------------------------------------------------------

name: linkdb release pipeline

on:
  push:
    tags:
      - 'v*-stage5.21'
      - 'v*-beta'
  workflow_dispatch:
    inputs:
      public_label:
        description: 'Public release label (e.g. v0.5.0-beta)'
        required: false
        default: 'v0.5.0-beta'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Principle-0 compliance: the public release artifacts must carry no private
  # design reasoning.  A leak into a public release is permanent, so this is a
  # hard gate before any packaging.
  # -------------------------------------------------------------------------
  principle-0:
    name: Release notes principle-0 gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check release-notes principle-0 (spec-5.21 D7)
        run: ./scripts/ci/check-release-notes-principle0.sh
      - name: Verify public release notes present
        run: |
          test -f docs/release-notes/v0.5.0-beta.md \
            || { echo "missing docs/release-notes/v0.5.0-beta.md"; exit 1; }
          test -f docs/user-guide/beta.md \
            || { echo "missing docs/user-guide/beta.md"; exit 1; }

  # -------------------------------------------------------------------------
  # Build + package the release artifact (public label naming).  Dry-run: the
  # tarball is uploaded as a workflow artifact, not published as a Release.
  # -------------------------------------------------------------------------
  package:
    name: Package (${{ matrix.os }})
    needs: principle-0
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      PUBLIC_LABEL: ${{ github.event.inputs.public_label || 'v0.5.0-beta' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential libreadline-dev zlib1g-dev libicu-dev \
            liblz4-dev libzstd-dev libssl-dev libxml2-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install icu4c openssl@3 lz4 zstd readline || true

      - name: Configure (--enable-cluster)
        run: |
          ./configure \
            --prefix="$PWD/_stage" \
            --with-openssl --with-icu --with-lz4 --with-zstd \
            --enable-cluster

      - name: Build and install to staging prefix
        run: |
          make -j$(getconf _NPROCESSORS_ONLN)
          make install

      - name: Package release artifact
        run: |
          arch=$(uname -m)
          osname=$(uname -s | tr '[:upper:]' '[:lower:]')
          name="pgrac-${PUBLIC_LABEL}-${osname}-${arch}.tar.gz"
          cp docs/release-notes/v0.5.0-beta.md _stage/RELEASE-NOTES.md
          tar -czf "$name" -C _stage .
          echo "ARTIFACT_NAME=$name" >> "$GITHUB_ENV"
          ls -lh "$name"

      - name: Upload release artifact (dry-run, not a published Release)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 7
